<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - AmkyawDev</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/3d-effects.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <style>
</head>
<body x-data="resetApp()">
    <!-- Preloader -->
    <div class="loader-container" id="preloader">
        <div class="loader-logo"><i class="fas fa-cube"></i> AmkyawDev</div>
        <div class="loader-spinner"></div>
        <div class="loader-progress"><div class="loader-progress-bar" id="progress-bar"></div></div>
        <div class="loader-text" id="loader-text">Loading...</div>
    </div>

    <!-- 3D Background -->
    <div id="3d-background"></div>
    
    <!-- Reset Page -->
    <div class="auth-page">
        <div class="auth-container">
            <!-- Step 1: Email Input -->
            <div x-show="step === 1">
                <div class="auth-header">
                    <div class="auth-icon"><i class="fas fa-lock-reset"></i></div>
                    <div class="auth-logo"><i class="fas fa-cube"></i> AmkyawDev</div>
                    <h1 class="auth-title">Reset Password</h1>
                    <p class="auth-subtitle">Enter your email address and we'll send you a link to reset your password.</p>
                </div>
                
                <div class="steps">
                    <div class="step active"></div>
                    <div class="step"></div>
                    <div class="step"></div>
                </div>
                
                <div class="error-message" id="error-msg" x-show="error" x-text="error"></div>
                <div class="success-message" id="success-msg" x-show="success" x-text="success"></div>
                
                <form class="auth-form" @submit.prevent="sendResetEmail">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-input" placeholder="Enter your email" x-model="email" required>
                    </div>
                    
                    <button type="submit" class="btn-primary" :disabled="loading">
                        <span class="spinner" x-show="loading"></span>
                        <span x-show="!loading">Send Reset Link</span>
                    </button>
                </form>
                
                <div class="back-to-login">
                    <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
                </div>
            </div>
            
            <!-- Step 2: Email Sent Success -->
            <div x-show="step === 2">
                <div class="auth-header">
                    <div class="auth-icon"><i class="fas fa-envelope-circle-check" style="color: #22c55e;"></i></div>
                    <div class="auth-logo"><i class="fas fa-cube"></i> AmkyawDev</div>
                    <h1 class="auth-title">Check Your Email</h1>
                    <p class="auth-subtitle">We've sent a password reset link to <span x-text="email" style="color: #4f46e5; font-weight: 600;"></span></p>
                </div>
                
                <div class="steps">
                    <div class="step completed"></div>
                    <div class="step active"></div>
                    <div class="step"></div>
                </div>
                
                <div class="success-message show">
                    <i class="fas fa-check-circle"></i> Reset link sent! Check your inbox.
                </div>
                
                <button class="btn-primary" @click="resendEmail" :disabled="resendLoading">
                    <span class="spinner" x-show="resendLoading"></span>
                    <span x-show="!resendLoading">Resend Email</span>
                </button>
                
                <p style="text-align: center; color: #64748b; margin-top: 20px; font-size: 0.85rem;">
                    Didn't receive the email? Check your spam folder or <a href="#" @click.prevent="step = 1" style="color: #4f46e5;">try another email</a>
                </p>
                
                <div class="back-to-login">
                    <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
                </div>
            </div>
            
            <!-- Step 3: New Password -->
            <div x-show="step === 3">
                <div class="auth-header">
                    <div class="auth-icon"><i class="fas fa-key"></i></div>
                    <div class="auth-logo"><i class="fas fa-cube"></i> AmkyawDev</div>
                    <h1 class="auth-title">Set New Password</h1>
                    <p class="auth-subtitle">Create a new strong password for your account.</p>
                </div>
                
                <div class="steps">
                    <div class="step completed"></div>
                    <div class="step completed"></div>
                    <div class="step active"></div>
                </div>
                
                <div class="error-message" id="error-msg" x-show="error" x-text="error"></div>
                <div class="success-message" id="success-msg" x-show="success" x-text="success"></div>
                
                <form class="auth-form" @submit.prevent="setNewPassword">
                    <div class="form-group">
                        <label class="form-label">New Password</label>
                        <input :type="showNewPassword ? 'text' : 'password'" class="form-input" placeholder="Enter new password" x-model="newPassword" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Confirm New Password</label>
                        <input :type="showConfirmPassword ? 'text' : 'password'" class="form-input" placeholder="Confirm new password" x-model="confirmPassword" required>
                    </div>
                    
                    <button type="submit" class="btn-primary" :disabled="loading">
                        <span class="spinner" x-show="loading"></span>
                        <span x-show="!loading">Update Password</span>
                    </button>
                </form>
                
                <div class="back-to-login">
                    <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
                </div>
            </div>
            
            <!-- Success -->
            <div x-show="step === 4">
                <div class="auth-header">
                    <div class="auth-icon"><i class="fas fa-circle-check" style="color: #22c55e;"></i></div>
                    <div class="auth-logo"><i class="fas fa-cube"></i> AmkyawDev</div>
                    <h1 class="auth-title">Password Updated!</h1>
                    <p class="auth-subtitle">Your password has been successfully reset. You can now sign in with your new password.</p>
                </div>
                
                <div class="steps">
                    <div class="step completed"></div>
                    <div class="step completed"></div>
                    <div class="step completed"></div>
                </div>
                
                <a href="login.html" class="btn-primary" style="text-decoration: none; display: inline-flex;">
                    Sign In Now
                </a>
            </div>
        </div>
    </div>

    <script src="config/firebase-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="assets/js/3d/three.js"></script>
    <script src="assets/js/main.js"></script>
    
    <script>
    // Initialize Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(window.firebaseConfig);
    }
    
    document.addEventListener("DOMContentLoaded", function() {
        const preloader = document.getElementById("preloader");
        const progressBar = document.getElementById("progress-bar");
        const loaderText = document.getElementById("loader-text");
        const msgs = ["Loading...", "Preparing...", "Almost ready..."];
        let progress = 0;
        setInterval(function() {
            progress++;
            progressBar.style.width = progress + "%";
            if(progress===30) loaderText.textContent=msgs[1];
            if(progress===60) loaderText.textContent=msgs[2];
            if(progress>=100) {
                clearInterval(this);
                setTimeout(function(){ preloader.classList.add("hidden"); setTimeout(function(){preloader.style.display="none"},500); },300);
            }
        },30);
    });
    
    // Get URL parameters for password reset
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const oobCode = urlParams.get('oobCode');
    
    function resetApp() {
        return {
            step: mode === 'resetPassword' && oobCode ? 3 : 1,
            email: '',
            newPassword: '',
            confirmPassword: '',
            showNewPassword: false,
            showConfirmPassword: false,
            loading: false,
            resendLoading: false,
            error: '',
            success: '',
            
            async sendResetEmail() {
                this.loading = true;
                this.error = '';
                this.success = '';
                
                try {
                    await firebase.auth().sendPasswordResetEmail(this.email, {
                        url: window.location.origin + '/login.html'
                    });
                    this.step = 2;
                    this.success = 'Password reset email sent!';
                } catch (err) {
                    this.error = this.getErrorMessage(err.code);
                }
                
                this.loading = false;
            },
            
            async resendEmail() {
                this.resendLoading = true;
                try {
                    await firebase.auth().sendPasswordResetEmail(this.email, {
                        url: window.location.origin + '/login.html'
                    });
                    this.success = 'Email resent successfully!';
                } catch (err) {
                    this.error = this.getErrorMessage(err.code);
                }
                this.resendLoading = false;
            },
            
            async setNewPassword() {
                if(this.newPassword !== this.confirmPassword) {
                    this.error = 'Passwords do not match.';
                    return;
                }
                if(this.newPassword.length < 6) {
                    this.error = 'Password must be at least 6 characters.';
                    return;
                }
                
                this.loading = true;
                this.error = '';
                
                try {
                    await firebase.auth().confirmPasswordReset(oobCode, this.newPassword);
                    this.step = 4;
                    this.success = 'Password updated successfully!';
                } catch (err) {
                    this.error = this.getErrorMessage(err.code);
                }
                
                this.loading = false;
            },
            
            getErrorMessage(code) {
                const messages = {
                    'auth/invalid-email': 'Invalid email address.',
                    'auth/user-not-found': 'No account found with this email.',
                    'auth/expired-action-code': 'This reset link has expired. Please request a new one.',
                    'auth/invalid-action-code': 'Invalid reset link. Please request a new one.',
                    'auth/weak-password': 'Password is too weak. Use at least 6 characters.',
                    'auth/network-request-failed': 'Network error. Please check your connection.'
                };
                return messages[code] || 'An error occurred. Please try again.';
            }
        };
    }
    </script>
</body>
</html>
