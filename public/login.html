<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AmkyawDev</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/3d-effects.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <style>
        .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 1; }
        .auth-container { width: 100%; max-width: 420px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border-radius: 24px; padding: 40px; border: 1px solid rgba(79, 70, 229, 0.2); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-logo { font-size: 1.8rem; font-weight: 700; color: #4f46e5; margin-bottom: 20px; }
        .auth-title { font-size: 1.8rem; font-weight: 700; color: white; margin-bottom: 8px; }
        .auth-subtitle { color: #94a3b8; font-size: 0.95rem; }
        .form-group { margin-bottom: 20px; position: relative; }
        .form-label { display: block; color: #e2e8f0; font-weight: 500; margin-bottom: 8px; font-size: 0.9rem; }
        .form-input { width: 100%; padding: 14px 16px; background: rgba(30, 41, 59, 0.8); border: 2px solid transparent; border-radius: 12px; color: white; font-size: 1rem; transition: all 0.3s ease; }
        .form-input:focus { outline: none; border-color: #4f46e5; background: rgba(30, 41, 59, 1); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .form-input::placeholder { color: #64748b; }
        .input-icon { position: absolute; right: 16px; top: 42px; color: #64748b; cursor: pointer; }
        .remember-me { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .checkbox-wrapper { display: flex; align-items: center; gap: 8px; color: #94a3b8; font-size: 0.9rem; }
        .forgot-password { color: #4f46e5; font-size: 0.9rem; transition: color 0.3s; }
        .forgot-password:hover { color: #6366f1; }
        .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color: white; border: none; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(79, 70, 229, 0.4); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
        .auth-divider { display: flex; align-items: center; margin: 24px 0; color: #64748b; font-size: 0.9rem; }
        .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: rgba(100, 116, 139, 0.3); }
        .auth-divider span { padding: 0 16px; }
        .social-login { display: flex; gap: 12px; justify-content: center; }
        .btn-social { width: 50px; height: 50px; background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(79, 70, 229, 0.2); border-radius: 12px; color: #94a3b8; font-size: 1.2rem; cursor: pointer; transition: all 0.3s ease; }
        .btn-social:hover { border-color: #4f46e5; color: #4f46e5; transform: translateY(-2px); }
        .auth-footer { text-align: center; margin-top: 24px; color: #94a3b8; font-size: 0.9rem; }
        .auth-footer a { color: #4f46e5; font-weight: 500; }
        .auth-footer a:hover { color: #6366f1; }
        .error-message { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #f87171; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 0.9rem; display: none; }
        .success-message { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #34d399; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 0.9rem; display: none; }
    </style>
</head>
<body x-data="authApp()" x-init="init()">
    <div id="3d-background"></div>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <a href="index.html" class="auth-logo"><i class="fas fa-cube"></i> AmkyawDev</a>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to continue</p>
            </div>
            <div class="error-message" id="error-msg" x-show="error" x-text="error" style="display: none;"></div>
            <div class="success-message" id="success-msg" x-show="success" x-text="success" style="display: none;"></div>
            <form class="auth-form" @submit.prevent="login">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" placeholder="Enter your email" x-model="email" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input :type="showPassword ? 'text' : 'password'" class="form-input" placeholder="Enter your password" x-model="password" required>
                    <i class="fas input-icon" :class="showPassword ? 'fa-eye-slash' : 'fa-eye'" @click="showPassword = !showPassword"></i>
                </div>
                <div class="remember-me">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="remember" x-model="rememberMe">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="reset.html" class="forgot-password">Forgot password?</a>
                </div>
                <button type="submit" class="btn-primary" :disabled="loading">
                    <span x-show="!loading">Sign In</span>
                    <span x-show="loading">Signing in...</span>
                </button>
            </form>
            <div class="auth-divider"><span>or</span></div>
            <div class="social-login">
                <button class="btn-social" @click="loginWithGoogle"><i class="fab fa-google"></i></button>
                <button class="btn-social" @click="loginWithGithub"><i class="fab fa-github"></i></button>
            </div>
            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
        </div>
    </div>
    <script src="assets/js/3d/three.js"></script>
    <script src="assets/js/3d/card-3d.js"></script>
    <script src="assets/js/auth/firebase-config.js"></script>
    <script src="assets/js/auth/auth.js"></script>
    <script>
        function authApp() {
            return {
                email: '', password: '', showPassword: false, rememberMe: false, loading: false, error: '', success: '',
                init() { if (typeof initAdvanced3DBackground === 'function') initAdvanced3DBackground(); },
                async login() {
                    this.loading = true; this.error = ''; this.success = '';
                    try {
                        // Add login logic here
                        this.success = 'Login successful!';
                        setTimeout(() => window.location.href = 'dashboard.html', 1500);
                    } catch (e) { this.error = e.message; }
                    this.loading = false;
                },
                loginWithGoogle() { console.log('Google login'); },
                loginWithGithub() { console.log('GitHub login'); }
            };
        }
    </script>
</body>
</html>
